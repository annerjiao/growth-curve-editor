name = "growth-curve-milestone-parser"
main = "src/index.js"
compatibility_date = "2024-09-01"
workers_dev = true

[vars]
# Comma-separated browser origins allowed to call this worker (CORS).
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5174,https://annerjiao.github.io"
ANTHROPIC_MODEL = "claude-sonnet-4-5"
RATE_LIMIT_PER_HOUR = "40"

# Set via: wrangler secret put ANTHROPIC_API_KEY
